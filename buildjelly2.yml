---
- name: Deploy and Automate Jellyfin Media Stack
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    base_dir: "{{ lookup('env', 'HOME') }}/automation"
    username: ""
    password: ""
    timezone: "Australia/Perth"

    downloads_mount: "/mnt/smb/downloads"
    movies_mount: "/mnt/smb/movies"
    tv_mount: "/mnt/smb/tv"

    enable_gpu: true
    gpu_render_device: "/dev/dri/renderD128"

  tasks:

    - name: Ensure configuration directories exist
      ansible.builtin.file:
        path: "{{ base_dir }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - jellyfin/config
        - jellyfin/cache
        - jellyseerr/config
        - radarr/config
        - sonarr/config
        - prowlarr/config
        - qbittorrent/config

    ###########################################################################
    # OPTION B — Inject Prowlarr Authentication BEFORE container starts
    ###########################################################################

    - name: Create initial Prowlarr config.xml with authentication if missing
      ansible.builtin.copy:
        dest: "{{ base_dir }}/prowlarr/config/config.xml"
        mode: '0644'
        content: |
          <Config>
            <ApiKey></ApiKey>
            <AuthenticationMethod>Forms</AuthenticationMethod>
            <Username>{{ username }}</Username>
            <Password>{{ password }}</Password>
          </Config>
      when: not lookup('file', base_dir + '/prowlarr/config/config.xml', errors='ignore')

    ###########################################################################
    # Remove old containers
    ###########################################################################

    - name: Remove old containers if they exist
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
      loop:
        - jellyfin
        - jellyseerr
        - radarr
        - sonarr
        - prowlarr
        - qbittorrent

    ###########################################################################
    # Write docker-compose.yml (Corrected Inline Compose)
    ###########################################################################

    - name: Write out docker-compose.yml
      ansible.builtin.copy:
        dest: "{{ base_dir }}/docker-compose.yml"
        mode: '0644'
        content: |
          services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    environment:
      - TZ=Australia/Perth
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/smb/movies:/media/movies:ro
      - /mnt/smb/tv:/media/tv:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: unless-stopped


  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=Australia/Perth
    volumes:
      - ./jellyseerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped


  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      - TZ=Australia/Perth

      # Use the supplied ExpressVPN OpenVPN profile
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - SERVER_REGIONS=CA Montreal
      - VPN_PORT_FORWARDING=true
      - OPENVPN_USER=p4610190
      - OPENVPN_PASSWORD=Teena.ishot86
      - DOT=false
      - TZ=Australia/Perth
      - DNS_ADDRESS=1.1.1.1
      - DNS_ADDRESS=8.8.8.8

      # Allow these services through Gluetun's LAN-side firewall
      - FIREWALL_INPUT_PORTS=7878,8989,9696,8080,8191

      # Allow access to the local network.
      # Change this if the friend's LAN uses another subnet.
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24

    volumes:
      - ./gluetun:/gluetun

    ports:
      # Radarr
      - "7878:7878"

      # Sonarr
      - "8989:8989"

      # Prowlarr
      - "9696:9696"

      # qBittorrent WebUI
      - "8080:8080"

      # FlareSolverr
      - "8191:8191"

      # qBittorrent incoming port.
      # ExpressVPN generally does not provide VPN port forwarding,
      # but these can remain for LAN/direct-use purposes.
      - "6881:6881"
      - "6881:6881/udp"

    healthcheck:
      test:
        - CMD
        - /gluetun-entrypoint
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 6

    restart: unless-stopped


  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr

    # Radarr shares Gluetun's IP address and VPN connection.
    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth

    volumes:
      - ./radarr/config:/config
      - /mnt/smb/movies:/movies
      - /mnt/smb/downloads:/downloads

    restart: unless-stopped


  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth

    volumes:
      - ./sonarr/config:/config
      - /mnt/smb/tv:/tv
      - /mnt/smb/downloads:/downloads

    restart: unless-stopped


  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth

    volumes:
      - ./prowlarr/config:/config

    restart: unless-stopped


  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881

    volumes:
      - ./qbittorrent/config:/config
      - /mnt/smb/downloads:/downloads

    restart: unless-stopped


  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    environment:
      - TZ=Australia/Perth
      - LOG_LEVEL=info

    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.15.1
    container_name: nginx-proxy-manager

    environment:
      - TZ=Australia/Perth
      - DISABLE_IPV6=true

    ports:
      # HTTP proxy traffic
      - "80:80"

      # Nginx Proxy Manager admin interface
      - "81:81"

      # HTTPS proxy traffic
      - "443:443"

    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt

    restart: unless-stopped

        ###########################################################################
    # Start stack
    ###########################################################################

    - name: Start the Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}"
        state: present

    - name: Wait for service ports to open
      ansible.builtin.wait_for:
        port: "{{ item }}"
        delay: 5
        timeout: 60
      loop: [7878, 8989, 9696, 8080]

    ###########################################################################
    # Wait for config.xml files to be generated
    ###########################################################################

    - name: Wait for Radarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/radarr/config/config.xml"
        timeout: 90

    - name: Wait for Sonarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/sonarr/config/config.xml"
        timeout: 90

    - name: Wait for Prowlarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        timeout: 90

    ###########################################################################
    # Extract API keys
    ###########################################################################

    - name: Extract Radarr API key
      community.general.xml:
        path: "{{ base_dir }}/radarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: radarr_api_xml

    - name: Extract Sonarr API key
      community.general.xml:
        path: "{{ base_dir }}/sonarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: sonarr_api_xml

    - name: Extract Prowlarr API key
      community.general.xml:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: prowlarr_api_xml

    - name: Set API key facts
      ansible.builtin.set_fact:
        radarr_api_key: "{{ radarr_api_xml.matches[0].ApiKey }}"
        sonarr_api_key: "{{ sonarr_api_xml.matches[0].ApiKey }}"
        prowlarr_api_key: "{{ prowlarr_api_xml.matches[0].ApiKey }}"
        prowlarr_url: "http://127.0.0.1:9696"
        radarr_url: "http://127.0.0.1:7878"
        sonarr_url: "http://127.0.0.1:8989"

    ###########################################################################
    # OPTION B — Enforce authentication AFTER container start
    ###########################################################################

    - name: Ensure Prowlarr authentication method is Forms
      community.general.xml:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        xpath: /Config/AuthenticationMethod
        value: "Forms"

    - name: Ensure Prowlarr username is correct
      community.general.xml:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        xpath: /Config/Username
        value: "{{ username }}"

    - name: Ensure Prowlarr password is correct
      community.general.xml:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        xpath: /Config/Password
        value: "{{ password }}"

    - name: Restart Prowlarr to apply authentication changes
      community.docker.docker_container:
        name: prowlarr
        state: started
        restart: true

    - name: Wait for Prowlarr to come back online
      ansible.builtin.wait_for:
        port: 9696
        delay: 2
        timeout: 30

    ###########################################################################
    # Link Radarr & Sonarr inside Prowlarr
    ###########################################################################

    - name: Get existing Prowlarr applications
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: [200]
      register: prowlarr_apps

    - name: Add Radarr to Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: "Radarr"
          implementation: "Radarr"
          configContract: "RadarrSettings"
          fields:
            - name: "prowlarrUrl"
              value: "{{ prowlarr_url }}"
            - name: "baseUrl"
              value: "{{ radarr_url }}"
            - name: "apiKey"
              value: "{{ radarr_api_key }}"
        status_code: 201
      when: "'Radarr' not in (prowlarr_apps.json | map(attribute='name') | list)"

    - name: Add Sonarr to Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: "Sonarr"
          implementation: "Sonarr"
          configContract: "SonarrSettings"
          fields:
            - name: "prowlarrUrl"
              value: "{{ prowlarr_url }}"
            - name: "baseUrl"
              value: "{{ sonarr_url }}"
            - name: "apiKey"
              value: "{{ sonarr_api_key }}"
        status_code: 201
      when: "'Sonarr' not in (prowlarr_apps.json | map(attribute='name') | list)"

    ###########################################################################
    # 1337x FIX — Prowlarr 2.x does NOT support API creation
    ###########################################################################

    - name: Skip 1337x indexer (Prowlarr 2.x does not support API creation)
      ansible.builtin.debug:
        msg: "1337x cannot be added via API in Prowlarr 2.x — add manually in UI."

    ###########################################################################
    # Display login URLs for all services
    ###########################################################################

    - name: Show login URLs
      ansible.builtin.debug:
        msg:
          - "Jellyfin:     http://localhost:8096"
          - "Jellyseerr:   http://localhost:5055"
          - "Radarr:       http://localhost:7878"
          - "Sonarr:       http://localhost:8989"
          - "Prowlarr:     http://localhost:9696"
          - "qBittorrent:  http://localhost:8080"

