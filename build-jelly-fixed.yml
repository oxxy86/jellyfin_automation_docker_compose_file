---
- name: Deploy and Automate Jellyfin Media Stack
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    base_dir: "{{ ansible_env.HOME }}/automation"
    username: "media"
    # SECURITY: don't leave this blank in the repo. Pass it at run time, e.g.
    #   ansible-playbook build-jelly-fixed.yml -e "password=SomeStrongPassword123"
    password: ""
    timezone: "Australia/Perth"

    # Storage mounts
    downloads_mount: "/mnt/smb/downloads"
    movies_mount: "/mnt/smb/movies"
    tv_mount: "/mnt/smb/tv"

    # Intel/AMD VAAPI passthrough for Jellyfin hardware transcoding.
    # Set to false on hosts with no /dev/dri render node (e.g. most VMs, ARM boards, no iGPU).
    enable_gpu: true
    gpu_render_device: "/dev/dri/renderD128"

  tasks:
    - name: Fail early if no password was supplied
      ansible.builtin.assert:
        that:
          - password | length > 0
        fail_msg: >-
          'password' is empty. Prowlarr will reject an empty admin password.
          Re-run with -e "password=YourStrongPassword" (don't commit real
          passwords into this file).
        quiet: true

    - name: Ensure configuration directories exist
      ansible.builtin.file:
        path: "{{ base_dir }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - jellyfin/config
        - jellyfin/cache
        - jellyseerr/config
        - radarr/config
        - sonarr/config
        - prowlarr/config
        - qbittorrent/config

    - name: Write out docker-compose.yml
      ansible.builtin.copy:
        dest: "{{ base_dir }}/docker-compose.yml"
        mode: '0644'
        content: |
          services:
            jellyfin:
              image: jellyfin/jellyfin:latest
              container_name: jellyfin
              network_mode: host
              environment:
                - TZ={{ timezone }}
              volumes:
                - ./jellyfin/config:/config
                - ./jellyfin/cache:/cache
                - {{ movies_mount }}/:/media/movies:ro
                - {{ tv_mount }}/:/media/tv:ro
          {% if enable_gpu %}
              devices:
                - {{ gpu_render_device }}:{{ gpu_render_device }}
          {% endif %}
              restart: unless-stopped

            jellyseerr:
              image: fallenbagel/jellyseerr:latest
              container_name: jellyseerr
              environment:
                - LOG_LEVEL=info
                - TZ={{ timezone }}
              volumes:
                - ./jellyseerr/config:/app/config
              ports:
                - 5055:5055
              restart: unless-stopped

            radarr:
              image: lscr.io/linuxserver/radarr:latest
              container_name: radarr
              environment:
                - PUID=1000
                - PGID=1000
                - TZ={{ timezone }}
              volumes:
                - ./radarr/config:/config
                - {{ movies_mount }}:/movies
                - {{ downloads_mount }}:/downloads
              ports:
                - 7878:7878
              restart: unless-stopped

            sonarr:
              image: lscr.io/linuxserver/sonarr:latest
              container_name: sonarr
              environment:
                - PUID=1000
                - PGID=1000
                - TZ={{ timezone }}
              volumes:
                - ./sonarr/config:/config
                - {{ tv_mount }}:/tv
                - {{ downloads_mount }}:/downloads
              ports:
                - 8989:8989
              restart: unless-stopped

            prowlarr:
              image: lscr.io/linuxserver/prowlarr:latest
              container_name: prowlarr
              environment:
                - PUID=1000
                - PGID=1000
                - TZ={{ timezone }}
              volumes:
                - ./prowlarr/config:/config
              ports:
                - 9696:9696
              restart: unless-stopped
              depends_on:
                - radarr
                - sonarr

            qbittorrent:
              image: lscr.io/linuxserver/qbittorrent:latest
              container_name: qbittorrent
              environment:
                - PUID=1000
                - PGID=1000
                - TZ={{ timezone }}
                - WEBUI_PORT=8080
              volumes:
                - ./qbittorrent/config:/config
                - {{ downloads_mount }}:/downloads
              ports:
                - 8080:8080
                - 6881:6881
                - 6881:6881/udp
              restart: unless-stopped

    - name: Start the Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}"
        state: present

    - name: Wait for service ports to open
      ansible.builtin.wait_for:
        port: "{{ item }}"
        delay: 5
        timeout: 60
      loop: [7878, 8989, 9696, 8080]

    # --- Wait for the *arr apps to actually finish first-boot and write config.xml ---
    # (this is the race condition the original playbook was missing: an open port
    # doesn't mean the app has generated its API key yet)

    - name: Wait for Radarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/radarr/config/config.xml"
        timeout: 90

    - name: Wait for Sonarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/sonarr/config/config.xml"
        timeout: 90

    - name: Wait for Prowlarr config.xml to exist
      ansible.builtin.wait_for:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        timeout: 90

    # --- Extract API keys ---

    - name: Extract Radarr API key from config file
      community.general.xml:
        path: "{{ base_dir }}/radarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: radarr_api_xml

    - name: Extract Sonarr API key from config file
      community.general.xml:
        path: "{{ base_dir }}/sonarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: sonarr_api_xml

    - name: Extract Prowlarr API key from config file
      community.general.xml:
        path: "{{ base_dir }}/prowlarr/config/config.xml"
        xpath: /Config/ApiKey
        content: text
      register: prowlarr_api_xml

    - name: Set convenience facts for API keys and base URL
      ansible.builtin.set_fact:
        radarr_api_key: "{{ radarr_api_xml.matches[0].ApiKey }}"
        sonarr_api_key: "{{ sonarr_api_xml.matches[0].ApiKey }}"
        prowlarr_api_key: "{{ prowlarr_api_xml.matches[0].ApiKey }}"
        # Ansible runs on the Docker host itself (connection: local), and every
        # service already publishes its port to that host - so there is no need
        # to inspect container networking or use internal container IPs at all.
        prowlarr_url: "http://127.0.0.1:9696"
        radarr_url: "http://127.0.0.1:7878"
        sonarr_url: "http://127.0.0.1:8989"

    # --- API configuration actions ---

    - name: Set up Forms Authentication on Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/config/authentication"
        method: PUT
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          authenticationMethod: "forms"
          username: "{{ username }}"
          password: "{{ password }}"
        status_code: [200, 202]

    - name: Check existing Prowlarr applications
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: [200]
      register: prowlarr_apps

    - name: Connect Radarr inside Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: "Radarr"
          implementation: "Radarr"
          configContract: "RadarrSettings"
          fields:
            - name: "prowlarrUrl"
              value: "{{ prowlarr_url }}"
            - name: "baseUrl"
              value: "{{ radarr_url }}"
            - name: "apiKey"
              value: "{{ radarr_api_key }}"
        status_code: 201
      when: "'Radarr' not in (prowlarr_apps.json | map(attribute='name') | list)"

    - name: Connect Sonarr inside Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: "Sonarr"
          implementation: "Sonarr"
          configContract: "SonarrSettings"
          fields:
            - name: "prowlarrUrl"
              value: "{{ prowlarr_url }}"
            - name: "baseUrl"
              value: "{{ sonarr_url }}"
            - name: "apiKey"
              value: "{{ sonarr_api_key }}"
        status_code: 201
      when: "'Sonarr' not in (prowlarr_apps.json | map(attribute='name') | list)"

    - name: Check existing Prowlarr indexers
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/indexer"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: [200]
      register: prowlarr_indexers

    - name: Add public torrent indexer (1337x) to Prowlarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/indexer"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: "1337x"
          protocol: "torrent"
          implementation: "Cardigann"
          configContract: "CardigannSettings"
          fields:
            - name: "baseUrl"
              value: "https://1337x.to"
        status_code: 201
      when: "'1337x' not in (prowlarr_indexers.json | map(attribute='name') | list)"
